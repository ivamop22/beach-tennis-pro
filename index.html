<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeachTennis Pro · Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ocean: #06142e;
            --ocean-mid: #0a2647;
            --ocean-light: #1da1f2;
            --accent: #a8e63c; /* Verde Lima BT */
            --coral: #ff5f40;
            --white: #FAFAFA;
            --card-bg: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ocean);
            color: var(--white);
            min-height: 100vh;
            padding-bottom: 80px; /* Espaço para nav fixa */
        }

        /* Background Dinâmico */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 10%, rgba(29, 161, 242, 0.1), transparent),
                        linear-gradient(160deg, #06142e 0%, #0a2647 100%);
            z-index: -1;
        }

        /* Header */
        .topbar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
        .topbar-logo span { color: var(--accent); }

        /* Cards de Partida */
        .game-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 15px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .game-header {
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .game-body {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 10px;
            text-align: center;
        }

        .team-names { font-weight: 700; font-size: 14px; }
        .p-code { color: var(--ocean-light); font-size: 11px; display: block; }

        /* Placar Centralizado */
        .score-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
        }

        .score-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            line-height: 1;
            color: var(--white);
        }

        .score-ctrls { display: flex; gap: 20px; }
        .ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .btn-score {
            width: 36px; height: 36px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white; font-size: 20px; cursor: pointer;
        }

        .btn-score:active { background: var(--ocean-light); }

        /* Navigation Mobile Fixa */
        .nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(6, 20, 46, 0.95);
            display: flex; justify-content: space-around;
            padding: 12px; border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .nav-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 11px; font-weight: 600; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 20px; }

        /* Tabela de Ranking */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .stats-table th { text-align: left; padding: 12px; color: var(--ocean-light); font-size: 12px; }
        .stats-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-save-round {
            background: var(--accent); color: var(--ocean);
            padding: 15px; border-radius: 12px; border: none;
            width: calc(100% - 30px); margin: 15px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        .page { display: none; padding: 10px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header class="topbar">
        <div class="topbar-logo">BEACH<span>TENNIS</span> PRO</div>
        <button onclick="doLogout()" style="background:none; border:none; color:var(--coral); font-size:12px;">Sair</button>
    </header>

    <div id="page-bracket" class="page active">
        <div id="games-list"></div>
        <button class="btn-save-round" onclick="saveTournament()">💾 Finalizar e Salvar Rodada</button>
    </div>

    <div id="page-ranking" class="page">
        <div class="game-card" style="padding: 20px;">
            <h2 style="font-family:'Bebas Neue'; color:var(--accent); margin-bottom:15px;">🏆 Classificação</h2>
            <table class="stats-table" id="ranking-table">
                <thead>
                    <tr>
                        <th>Jogador</th>
                        <th>V</th>
                        <th>Sald.</th>
                        <th>%</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="goPage('bracket', this)"><span>🎾</span>Jogos</button>
        <button class="nav-btn" onclick="goPage('ranking', this)"><span>🏆</span>Ranking</button>
        <button class="nav-btn" onclick="location.reload()"><span>⚙️</span>Novo</button>
    </nav>
</div>

<script>
    const SUPABASE_URL = 'https://mxjnydrllpxqwmfwzlsr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Mantenha sua chave real aqui
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Estado Local do Torneio (Simulado para o exemplo, você pode integrar com seu gerador)
    let ST = {
        players: [
            { id: 1, nome: "Carlos", sobrenome: "Silva" },
            { id: 2, nome: "Daniel", sobrenome: "Moraes" },
            { id: 3, nome: "Bruno", sobrenome: "Oliveira" },
            { id: 4, nome: "Felipe", sobrenome: "Santos" }
        ],
        games: [
            { id: 1, teams: [[1, 2], [3, 4]], score: [0, 0], status: 'aguardando' }
        ]
    };

    function goPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        btn.classList.add('active');
        if(pageId === 'ranking') updateRanking();
    }

    function renderGames() {
        const list = document.getElementById('games-list');
        list.innerHTML = ST.games.map(g => `
            <div class="game-card">
                <div class="game-header">PARTIDA #${g.id} <span>${g.status.toUpperCase()}</span></div>
                <div class="game-body">
                    <div class="team-names">
                        <span class="p-code">J${g.teams[0][0]}</span> ${getName(g.teams[0][0])}<br>
                        <span class="p-code">J${g.teams[0][1]}</span> ${getName(g.teams[0][1])}
                    </div>
                    <div class="score-area">
                        <div class="score-display">${g.score[0]} - ${g.score[1]}</div>
                        <div class="score-ctrls">
                            <div class="ctrl-group">
                                <button class="btn-score" onclick="adj(${g.id}, 0, 1)">+</button>
                                <button class="btn-score" onclick="adj(${g.id}, 0, -1)">-</button>
                            </div>
                            <div class="ctrl-group">
                                <button class="btn-score" onclick="adj(${g.id}, 1, 1)">+</button>
                                <button class="btn-score" onclick="adj(${g.id}, 1, -1)">-</button>
                            </div>
                        </div>
                    </div>
                    <div class="team-names">
                        <span class="p-code">J${g.teams[1][0]}</span> ${getName(g.teams[1][0])}<br>
                        <span class="p-code">J${g.teams[1][1]}</span> ${getName(g.teams[1][1])}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getName(id) {
        const p = ST.players.find(x => x.id === id);
        return p ? p.nome : 'N/A';
    }

    // CORREÇÃO DA FUNÇÃO ADJ
    function adj(gameId, teamIdx, delta) {
        const game = ST.games.find(g => g.id === gameId);
        if (!game) return;

        let newVal = game.score[teamIdx] + delta;
        if (newVal < 0 || newVal > 6) return; // Limite padrão de sets

        game.score[teamIdx] = newVal;
        game.status = (game.score[0] === 0 && game.score[1] === 0) ? 'aguardando' : 'andamento';
        if (game.score[0] === 6 || game.score[1] === 6) game.status = 'concluído';
        
        renderGames();
    }

    // IMPLEMENTAÇÃO DO RANKING
    function updateRanking() {
        let stats = {};
        ST.players.forEach(p => stats[p.id] = { nome: p.nome, v: 0, saldo: 0, jogos: 0 });

        ST.games.forEach(g => {
            if (g.status === 'concluído') {
                const winIdx = g.score[0] > g.score[1] ? 0 : 1;
                const saldo = Math.abs(g.score[0] - g.score[1]);
                
                g.teams[winIdx].forEach(pid => { stats[pid].v++; stats[pid].saldo += saldo; stats[pid].jogos++; });
                g.teams[1 - winIdx].forEach(pid => { stats[pid].saldo -= saldo; stats[pid].jogos++; });
            }
        });

        const sorted = Object.values(stats).sort((a, b) => b.v - a.v || b.saldo - a.saldo);
        
        document.getElementById('ranking-body').innerHTML = sorted.map(s => `
            <tr>
                <td><strong>${s.nome}</strong></td>
                <td>${s.v}</td>
                <td style="color:${s.saldo >= 0 ? 'var(--accent)' : 'var(--coral)'}">${s.saldo}</td>
                <td>${s.jogos > 0 ? Math.round((s.v / s.jogos) * 100) : 0}%</td>
            </tr>
        `).join('');
    }

    // SALVAMENTO NO SUPABASE
    async function saveTournament() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return alert("Faça login para salvar!");

        const payload = {
            user_id: user.id,
            data_torneio: new Date().toISOString(),
            resultado_json: ST
        };

        const { error } = await sb.from('historico_torneios').insert([payload]);
        
        if (error) alert("Erro ao salvar: " + error.message);
        else alert("✅ Torneio salvo com sucesso no Histórico!");
    }

    // Inicialização
    renderGames();
</script>

</body>
</html>
