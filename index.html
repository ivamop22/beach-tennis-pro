<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneio Arena GWM · Beach Tennis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gwm-yellow: #f5d100;
  --gwm-black: #1a1a1b;
  --gwm-gray: #2d2d2e;
  --gwm-light: #f4f4f4;
  --danger: #e74c3c;
  --success: #2ecc71;
  --white: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: 'DM Sans', sans-serif; 
  background-color: var(--gwm-black); 
  color: var(--white); 
  min-height: 100vh;
}

/* HEADER & BRANDING */
.auth-logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  color: var(--gwm-yellow);
  font-size: 2.5rem;
  line-height: 1;
}
.auth-logo span {
  font-size: 0.8rem;
  letter-spacing: 2px;
  color: var(--white);
}

/* BUTTONS */
.btn-primary {
  background-color: var(--gwm-yellow);
  color: var(--gwm-black);
  font-weight: 700;
  border-radius: 8px;
  transition: transform 0.2s;
}
.btn-primary:hover {
  transform: scale(1.02);
  background-color: #e6c200;
}

/* APP COMPONENTS */
.topbar {
  background-color: var(--gwm-gray);
  border-bottom: 2px solid var(--gwm-yellow);
  padding: 15px 20px;
}
.topbar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
}
.topbar-logo span { color: var(--gwm-yellow); }

.nav-btn.active {
  background-color: var(--gwm-yellow);
  color: var(--gwm-black);
}

.card {
  background-color: var(--gwm-gray);
  border: 1px solid rgba(245, 209, 0, 0.2);
  border-radius: 12px;
}
/* ... resto da lógica JavaScript mantida e otimizada ... */
</style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-logo">ARENA <span>GWM</span></div>
      <div class="topbar-user">
        <span id="user-display"></span>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </div>
    </div>
</body>
</html>
