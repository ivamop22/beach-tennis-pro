const fmtTime = s => {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return h>0 ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
};
const initials = (n,s) => ((n||'?')[0]+(s||'?')[0]).toUpperCase();
const capitalize = s => s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : '';

// ─── Geração de rodadas ───────────────────────────────────────────────────────
function generateRounds(players){
  const n = players.length;
  const rounds = [];
  const addGame = (r, a, b, c, d) => {
    const t1 = [players[a], players[b]];
    const t2 = [players[c], players[d]];
    rounds[r] = rounds[r] || [];
    rounds[r].push({ id: `${r}-${rounds[r].length}`, t1, t2, s1:0, s2:0, status:'wait' });
  };
  if(n===6){
    addGame(0,0,1,2,3); addGame(0,4,5,0,2); addGame(0,1,3,4,5);
  } else if(n===8){
    addGame(0,0,1,2,3); addGame(0,4,5,6,7); addGame(1,0,2,4,6); addGame(1,1,3,5,7); addGame(2,0,3,5,6); addGame(2,1,2,4,7);
  } else if(n===9){
    for(let i=0;i<9;i++) for(let j=i+1;j<9;j++) if((i+j)%3===0) { if(rounds.flat().length<9) addGame(Math.floor(rounds.flat().length/3),i,j, (i+1)%9,(j+1)%9); }
    if(rounds.flat().length===0){ addGame(0,0,1,2,3); addGame(0,4,5,6,7); addGame(0,8,0,1,2); addGame(1,3,4,5,6); addGame(1,7,8,0,3); addGame(2,1,4,2,5); addGame(2,6,8,7,0); addGame(2,3,5,4,8); addGame(2,1,6,2,7); }
  } else if(n===10){
    addGame(0,0,1,2,3); addGame(0,4,5,6,7); addGame(0,8,9,0,4);
    addGame(1,1,3,5,7); addGame(1,2,6,8,0); addGame(1,9,4,1,5);
    addGame(2,0,2,3,6); addGame(2,7,9,4,8); addGame(2,1,6,5,9);
    addGame(2,2,7,3,8);
  } else if(n===11){
    for(let i=0;i<4;i++){
      const base = i*2;
      addGame(i, base%11, (base+1)%11, (base+2)%11, (base+3)%11);
      addGame(i, (base+4)%11, (base+5)%11, (base+6)%11, (base+7)%11);
    }
  } else { // 12
    addGame(0,0,1,2,3); addGame(0,4,5,6,7); addGame(0,8,9,10,11);
    addGame(1,0,2,4,6); addGame(1,8,10,1,3); addGame(1,5,7,9,11);
    addGame(2,0,4,8,1); addGame(2,5,9,2,6); addGame(2,3,7,10,11);
    addGame(2,0,3,4,7); addGame(2,8,11,1,5); addGame(2,6,9,2,10);
  }
  return rounds.filter(Boolean);
}

// ─── Calcular stats ───────────────────────────────────────────────────────────
function calcStats(players, games){
  const stats = {};
  players.forEach(p => {
    stats[p.id] = { player:p, jogos:0, vitorias:0, gp:0, gc:0, parceiros:{} };
  });
  games.forEach(r => r.forEach(g => {
    if(g.status!=='done') return;
    const w1 = g.s1 > g.s2;
    [[g.t1,g.s1,g.s2,w1],[g.t2,g.s2,g.s1,!w1]].forEach(([team,gf,ga,win])=>{
      team.forEach(p=>{
        if(!stats[p.id]) return;
        stats[p.id].jogos++;
        if(win) stats[p.id].vitorias++;
        stats[p.id].gp += gf;
        stats[p.id].gc += ga;
        const partner = team.find(x=>x.id!==p.id);
        if(partner){
          stats[p.id].parceiros[partner.id] = (stats[p.id].parceiros[partner.id]||0)+1;
        }
      });
    });
  }));
  return Object.values(stats).sort((a,b)=> b.vitorias-a.vitorias || (b.gp-b.gc)-(a.gp-a.gc));
}

function Auth({ onLogin }){
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    setErr(''); setLoading(true);
    try {
      if(tab==='login'){
        const { data, error } = await sb.auth.signInWithPassword({ email, password:pass });
        if(error) throw error;
        onLogin(data.user);
      } else {
        const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ full_name:name } } });
        if(error) throw error;
        if(data.user) onLogin(data.user);
        else setErr('Verifique seu e-mail para confirmar cadastro.');
      }
    } catch(e){ setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-box">
        <div className="auth-logo">
          <h1>ARENA <span>GWM</span></h1>
          <p>Sistema de Torneio · Beach Tennis</p>
        </div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Entrar</button>
          <button className={`auth-tab ${tab==='signup'?'active':''}`} onClick={()=>setTab('signup')}>Cadastrar</button>
        </div>
        {tab==='signup' && <div className="field"><label>Nome</label><input placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)}/></div>}
        <div className="field"><label>E-mail</label><input type="email" placeholder="email@exemplo.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        <div className="field"><label>Senha</label><input type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
        <button className="btn btn-gold" onClick={handle} disabled={loading}>{loading?'Aguarde...':(tab==='login'?'Entrar':'Cadastrar')}</button>
        {err && <p className="err-msg">{err}</p>}

    </div>
  );
}

// ─── Setup ────────────────────────────────────────────────────────────────────
function Setup({ user, onStart }){
  const [count, setCount] = useState(8);
  const [slots, setSlots] = useState(Array(8).fill(null));
  const [modalIdx, setModalIdx] = useState(null);

  useEffect(()=>{
    setSlots(s => {
      const next = Array(count).fill(null);
      for(let i=0;i<Math.min(s.length,count);i++) next[i]=s[i];
      return next;
    });
  },[count]);

  const usedIds = slots.filter(Boolean).map(p=>p.id);
  const filled = slots.filter(Boolean).length;

  return (
    <div className="container page">
      <div className="page-title">CONFIGURAR <span>TORNEIO</span></div>

        <div className="count-grid">

            <button key={n} className={`count-btn ${count===n?'active':''}`} onClick={()=>setCount(n)}>{n}</button>
          ))}
        </div>
      </div>

      <div className="section-card">
        <div className="section-title">Jogadores ({filled}/{count})</div>
        <div className="players-grid">
          {slots.map((p,i)=>(
            <div key={i} className={`player-slot ${p?'filled':'empty'}`} onClick={()=>p?setSlots(s=>{const n=[...s];n[i]=null;return n;}):setModalIdx(i)}>
              <span className="slot-num">{String(i+1).padStart(2,'0')}</span>
              {p ? (
                <>
                  <span className="slot-name">{p.nome} {p.sobrenome}</span>
                  <span className="slot-remove">✕</span>
                </>
              ) : (

                  <span className="slot-add">+</span>
                </>
              )}

  );

// ─── Bracket ─────────────────────────────────────────────────────────────────
function Bracket({ user, players, rounds, setRounds, timer, timerRunning, setTimerRunning, onSave, onReset }){
  const updateScore = (ri,gi,team,delta) => {
    setRounds(prev => {
      const next = prev.map(r=>r.map(g=>({...g})));
      const g = next[ri][gi];
      if(team===1) g.s1 = Math.max(0, g.s1+delta);
      else g.s2 = Math.max(0, g.s2+delta);
      if(g.s1>0||g.s2>0) g.status='active';
      if(g.s1>=6||g.s2>=6) g.status='done';
      return next;
    });
  };

  const allDone = rounds.every(r=>r.every(g=>g.status==='done'));

  return (
    <div className="container page">
      <div className="page-title">CHAVEAMENTO <span>AO VIVO</span></div>
      <div className="page-sub">{players.length} jogadores · {rounds.reduce((a,r)=>a+r.length,0)} partidas</div>

      <div className="bracket-header">
        <div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Tempo de Jogo</div>
          <div className={`timer ${timerRunning?'':'paused'}`}>{fmtTime(timer)}</div>
        </div>
        <div className="timer-btns">
          <button className="icon-btn" onClick={()=>setTimerRunning(t=>!t)}>{timerRunning?'⏸ Pausar':'▶ Iniciar'}</button>
          {allDone && <button className="icon-btn" onClick={onSave}>💾 Salvar Rodada</button>}
          <button className="icon-btn danger" onClick={onReset}>↺ Nova</button>
        </div>
      </div>

      {rounds.map((round,ri)=>(
        <div key={ri} style={{marginBottom:28}}>
          <div className="round-label">Rodada {ri+1}</div>
          <div className="games-grid">
            {round.map((g,gi)=>{
              const w1 = g.s1>g.s2, w2 = g.s2>g.s1;
              return (
                <div key={g.id} className={`game-card ${g.status==='active'?'active':''} ${g.status==='done'?'done':''}`}>
                  <div className="game-top">
                    <span className="game-num">Jogo {ri+1}.{gi+1}</span>
                    <span className={`game-status-badge ${g.status==='wait'?'badge-wait':g.status==='active'?'badge-active':'badge-done'}`}>
                      {g.status==='wait'?'Aguardando':g.status==='active'?'Em Jogo':'Finalizado'}
                    </span>
                  </div>
                  <div className="game-teams">
                    {[{team:g.t1,score:g.s1,other:g.s2,side:1,win:w1},{team:g.t2,score:g.s2,other:g.s1,side:2,win:w2}].map(({team,score,side,win})=>(
                      <div key={side} className={`team-row ${win&&g.status==='done'?'winner':''}`}>
                        <div className="team-names">
                          <span>{team[0]?.nome}</span><span className="slash">/</span><span>{team[1]?.nome}</span>
                        </div>
                        <div className="score-ctrl">
                          <button className="score-btn minus" onClick={()=>updateScore(ri,gi,side,-1)}>−</button>
                          <span className="score-val" style={{color:win&&g.status==='done'?'var(--green)':'var(--text)'}}>{score}</span>
                          <button className="score-btn plus" onClick={()=>updateScore(ri,gi,side,1)}>+</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Save Modal ───────────────────────────────────────────────────────────────
function SaveModal({ user, players, rounds, timer, onClose, onSaved, showToast }){
  const [name, setName] = useState(`Rodada ${new Date().toLocaleDateString('pt-BR')}`);
  const [saving, setSaving] = useState(false);

  const stats = calcStats(players, rounds);

  const doSave = async () => {
    setSaving(true);
    try {
      const playersData = stats.map(s=>({
        nome: s.player.nome, sobrenome: s.player.sobrenome,
        jogos: s.jogos, vitorias: s.vitorias, games_pro: s.gp, games_contra: s.gc
      }));
      const gamesData = rounds.flat().map(g=>({
        t1: g.t1.map(p=>p.nome), t2: g.t2.map(p=>p.nome),
        s1: g.s1, s2: g.s2, status: g.status
      }));
      const { error } = await sb.rpc('save_round',{
        p_user_id: user.id, p_name: name, p_player_count: players.length,
        p_duration: timer, p_players: playersData, p_games: gamesData
      });
      if(error) throw error;
      showToast('Rodada salva com sucesso!','success');
      onSaved();
    } catch(e){ showToast('Erro ao salvar: '+e.message,'error'); }
    setSaving(false);
  };

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="save-modal">
        <h3>Salvar Rodada</h3>
        <div className="field"><label>Nome da Rodada</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
        <div style={{background:'var(--dark3)',borderRadius:8,padding:'12px 14px',fontSize:13,color:'var(--muted2)'}}>
          {players.length} jogadores · {rounds.reduce((a,r)=>a+r.length,0)} partidas · {fmtTime(timer)}
        </div>
        <div className="save-actions">
          <button className="btn btn-outline" style={{flex:1,padding:'11px'}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-gold" style={{flex:2,padding:'11px'}} onClick={doSave} disabled={saving}>{saving?'Salvando...':'Confirmar →'}</button>
        </div>
      </div>
    </div>
  );
}

      setUser(session?.user||null); setLoading(false);
    });
    const { data:{subscription} } = sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(timerRunning){ timerRef.current = setInterval(()=>setTimer(t=>t+1),1000); }
    else clearInterval(timerRef.current);
    return ()=>clearInterval(timerRef.current);
  },[timerRunning]);

  const showToast = (msg,type='success') => {
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const handleStart = (selectedPlayers, count) => {
    setPlayers(selectedPlayers);
    setRounds(generateRounds(selectedPlayers));
    setTimer(0);
    setTimerRunning(true);
    setPage('bracket');
  };

  const handleReset = () => {
    if(confirm('Iniciar nova rodada? O progresso atual será perdido.')) {
      setTimerRunning(false); setTimer(0); setRounds([]); setPlayers([]); setPage('setup');
    }
  };

  const handleSaved = () => { setShowSave(false); showToast('Salvo!'); };

  const logout = async () => { await sb.auth.signOut(); setUser(null); };

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><div className="spinner"/></div>;
  if(!user) return <Auth onLogin={setUser}/>;

  const inGame = page==='bracket'||page==='stats'||page==='ranking';
  const navItems = [
    {id:'setup',label:'Nova Rodada'},
    ...(rounds.length>0 ? [{id:'bracket',label:'Chaveamento'},{id:'stats',label:'Stats'},{id:'ranking',label:'Ranking'}] : []),
    {id:'history',label:'Histórico'},
  ];

  return (
    <>
      <div className="header">
        <div className="header-logo">ARENA <span>GWM</span></div>
        <div className="nav">
          {navItems.map(n=>(
            <button key={n.id} className={`nav-btn ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>{n.label}</button>
          ))}
        </div>
        <div className="header-right">
          {inGame && rounds.length>0 && <span className="header-user">{fmtTime(timer)}</span>}
          <span className="header-user">{user.email?.split('@')[0]}</span>
          <button className="icon-btn" onClick={logout} style={{fontSize:12,padding:'5px 10px'}}>Sair</button>
        </div>
      </div>

      {page==='setup' && <Setup user={user} onStart={handleStart}/>}
      {page==='bracket' && <Bracket user={user} players={players} rounds={rounds} setRounds={setRounds} timer={timer} timerRunning={timerRunning} setTimerRunning={setTimerRunning} onSave={()=>setShowSave(true)} onReset={handleReset}/>}
      {page==='stats' && <Stats players={players} rounds={rounds}/>}
      {page==='ranking' && <Ranking user={user} players={players} rounds={rounds}/>}
      {page==='history' && <History user={user}/>}

      {showSave && <SaveModal user={user} players={players} rounds={rounds} timer={timer} onClose={()=>setShowSave(false)} onSaved={handleSaved} showToast={showToast}/>}
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
