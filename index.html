<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena GWM · Torneio de Beach Tennis</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Anton&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0A0F0A; /* Fundo escuro conforme imagem */
            --green-bt: #63E678; /* Verde da imagem */
            --gold-arena: #E5C163; /* Dourado Arena GWM */
            --white: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.05);
            --ocean-blue: #00C2CB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* HEADER ESTILO ARENA GWM */
        .topbar {
            padding: 25px 20px;
            background: linear-gradient(to bottom, #0D140D, #0A0F0A);
            border-bottom: 1px solid rgba(99, 230, 120, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-main { display: flex; flex-direction: column; }

        .title-top {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .title-top span { color: var(--green-bt); }

        .arena-name {
            font-weight: 700;
            color: var(--gold-arena);
            font-size: 16px;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
        }

        /* CARDS E PLACAR */
        .game-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 15px;
            backdrop-filter: blur(10px);
        }

        .game-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .game-body {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 10px;
            text-align: center;
        }

        .team-names { font-weight: 600; font-size: 14px; line-height: 1.4; }
        .p-code { color: var(--green-bt); font-size: 11px; opacity: 0.8; }

        .score-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .score-display {
            font-family: 'Anton', sans-serif;
            font-size: 46px;
            color: var(--white);
            background: #152015;
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--green-bt);
        }

        .btn-score {
            width: 35px; height: 35px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white; font-size: 18px; cursor: pointer;
        }

        .btn-score:active { background: var(--green-bt); color: var(--bg-dark); }

        /* NAV E BOTÕES */
        .nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(20, 30, 20, 0.9);
            display: flex; justify-content: space-around;
            padding: 12px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(99, 230, 120, 0.2);
        }

        .nav-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .nav-btn.active { color: var(--green-bt); }
        .nav-btn span { font-size: 20px; margin-bottom: 2px; }

        .btn-action {
            background: var(--green-bt); color: var(--bg-dark);
            padding: 16px; border-radius: 12px; border: none;
            width: calc(100% - 30px); margin: 15px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        .stats-card { background: var(--card-bg); margin: 15px; padding: 20px; border-radius: 20px; }
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table th { text-align: left; font-size: 11px; color: var(--green-bt); padding: 10px; }
        .stats-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header class="topbar">
        <div class="header-main">
            <div class="title-top">Torneio de <span>Beach Tennis</span></div>
            <div class="arena-name">Arena GWM</div>
            <div class="slogan">⚡ Sistema de Chaveamento Inteligente</div>
        </div>
        <button onclick="doLogout()" style="background:none; border:none; color:var(--green-bt); font-size:12px; font-weight:600;">SAIR</button>
    </header>

    <div id="page-bracket" class="page active">
        <div id="games-list"></div>
        <button class="btn-action" onclick="saveTournament()">💾 Salvar Resultados no Supabase</button>
    </div>

    <div id="page-ranking" class="page">
        <div class="stats-card">
            <h2 style="font-family:'Anton'; margin-bottom:15px; letter-spacing:1px; color:var(--gold-arena);">🏆 RANKING GERAL</h2>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>JOGADOR</th>
                        <th>VIT</th>
                        <th>SG</th>
                        <th>%</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="goPage('bracket', this)"><span>🎾</span>JOGOS</button>
        <button class="nav-btn" onclick="goPage('ranking', this)"><span>🏆</span>RANKING</button>
        <button class="nav-btn" onclick="location.reload()"><span>🔄</span>NOVO</button>
    </nav>
</div>

<script>
    // Substitua pelas suas credenciais reais do Supabase
    const SUPABASE_URL = 'https://mxjnydrllpxqwmfwzlsr.supabase.co';
    const SUPABASE_KEY = 'SUA_KEY_AQUI'; 
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Estado do App
    let ST = {
        players: [
            { id: 1, nome: "Leonardo" },
            { id: 2, nome: "Gilvan" },
            { id: 3, nome: "Marcelo" },
            { id: 4, nome: "Rodrigo" }
        ],
        games: [
            { id: 1, teams: [[1, 2], [3, 4]], score: [0, 0], status: 'aguardando' }
        ]
    };

    function goPage(p, btn) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        btn.classList.add('active');
        if(p === 'ranking') renderRanking();
    }

    function renderGames() {
        const list = document.getElementById('games-list');
        list.innerHTML = ST.games.map(g => `
            <div class="game-card">
                <div class="game-header">PARTIDA #${g.id} <span style="color:var(--green-bt)">${g.status.toUpperCase()}</span></div>
                <div class="game-body">
                    <div class="team-names">
                        <span class="p-code">J${g.teams[0][0]}</span> ${getName(g.teams[0][0])}<br>
                        <span class="p-code">J${g.teams[0][1]}</span> ${getName(g.teams[0][1])}
                    </div>
                    <div class="score-area">
                        <div class="score-display">${g.score[0]}:${g.score[1]}</div>
                        <div style="display:flex; gap:15px;">
                            <button class="btn-score" onclick="adj(${g.id},0,1)">+</button>
                            <button class="btn-score" onclick="adj(${g.id},1,1)">+</button>
                        </div>
                    </div>
                    <div class="team-names">
                        <span class="p-code">J${g.teams[1][0]}</span> ${getName(g.teams[1][0])}<br>
                        <span class="p-code">J${g.teams[1][1]}</span> ${getName(g.teams[1][1])}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getName(id) { return ST.players.find(p => p.id === id)?.nome || 'J'; }

    function adj(gid, tIdx, d) {
        const g = ST.games.find(x => x.id === gid);
        if(!g) return;
        g.score[tIdx] = Math.max(0, g.score[tIdx] + d);
        g.status = (g.score[0] >= 6 || g.score[1] >= 6) ? 'concluido' : 'andamento';
        renderGames();
    }

    function renderRanking() {
        let stats = {};
        ST.players.forEach(p => stats[p.id] = { nome: p.nome, v: 0, sg: 0, j: 0 });
        ST.games.forEach(g => {
            if(g.status === 'concluido') {
                const w = g.score[0] > g.score[1] ? 0 : 1;
                const diff = Math.abs(g.score[0] - g.score[1]);
                g.teams[w].forEach(id => { stats[id].v++; stats[id].sg += diff; stats[id].j++; });
                g.teams[1-w].forEach(id => { stats[id].sg -= diff; stats[id].j++; });
            }
        });
        const sorted = Object.values(stats).sort((a,b) => b.v - a.v || b.sg - a.sg);
        document.getElementById('ranking-body').innerHTML = sorted.map(s => `
            <tr>
                <td><b>${s.nome}</b></td>
                <td>${s.v}</td>
                <td style="color:${s.sg>=0?'var(--green-bt)':'#ff5f40'}">${s.sg}</td>
                <td>${s.j > 0 ? Math.round((s.v/s.j)*100) : 0}%</td>
            </tr>
        `).join('');
    }

    async function saveTournament() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return alert("Por favor, faça login.");
        const { error } = await sb.from('historico_torneios').insert([{ user_id: user.id, resultado_json: ST }]);
        if(error) alert("Erro: " + error.message);
        else alert("✅ Resultados salvos na Arena GWM!");
    }

    renderGames();
</script>
</body>
</html>
